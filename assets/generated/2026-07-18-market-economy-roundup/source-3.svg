<path d="M 720 176 l -7 -6 v 12 z" fill="#6A7376"/>
<polygon points="810,121 900,176 810,231 720,176" fill="#FFFFFF" stroke="#8A5A44" stroke-width="2"/>
<text x="810" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1D2528">모형 가정 타당?</text>
<text x="810" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#445055">식별·파라미터</text>
