<rect x="726" y="286" width="168" height="68" rx="8" fill="#FFFFFF" stroke="#D6DED9"/>
<rect x="726" y="286" width="168" height="8" rx="4" fill="#8A5A44"/>
<text x="810" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#1D2528">가정 민감도 점검</text>
<text x="810" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#445055">대체 시나리오 비교</text>
