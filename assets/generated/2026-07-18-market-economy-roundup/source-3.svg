<rect x="500" y="138" width="170" height="8" rx="4" fill="#8A5A44"/>
<text x="585" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#1D2528">전이 경로</text>
<text x="585" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#445055">기업→투자→거시활동</text>
