<path d="M 585 96 l 7 -6 v 12 z" fill="#6A7376"/>
<line x1="585" y1="96" x2="585" y2="122" stroke="#6A7376" stroke-width="2"/>
<path d="M 585 122 l -7 -6 v 12 z" fill="#6A7376"/>
<rect x="500" y="122" width="170" height="68" rx="8" fill="#FFFFFF" stroke="#D6DED9"/>
<rect x="500" y="122" width="170" height="8" rx="4" fill="#4F6F52"/>
<text x="585" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#1D2528">리스크 경로</text>
<text x="585" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#445055">불확실성 증폭 해석</text>
<line x1="585" y1="190" x2="585" y2="250" stroke="#6A7376" stroke-width="2"/>
<path d="M 585 250 l -7 -6 v 12 z" fill="#6A7376"/>
<rect x="500" y="250" width="170" height="68" rx="8" fill="#FFFFFF" stroke="#D6DED9"/>
<rect x="500" y="250" width="170" height="8" rx="4" fill="#5A5878"/>
<text x="585" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#1D2528">시나리오 반영</text>
<text x="585" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#445055">섹터·팩터 리스크 점검</text>
<text x="52" y="388" font-family="Arial, sans-serif" font-size="13" fill="#5F686B">논리: 충격이 기업 불확실성을 키우고 거시활동으로 전이되는지 확인한 뒤 리스크 시나리오로 전환합니다.</text>
